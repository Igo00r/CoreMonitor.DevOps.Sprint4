# azure-pipelines.yml
# Esteira CI/CD do CoreMonitor para o Azure DevOps.
# CI: instala dependencias, roda lint e testes, e publica o artefato.
# CD: faz deploy do artefato no Azure App Service.
#
# Pre-requisitos no Azure DevOps:
#   1. Pipeline conectada a este repositorio do GitHub.
#   2. Uma "Service connection" do tipo Azure Resource Manager (para o deploy).
#   3. Um Azure App Service (Linux, Node 18) ja criado.
#   4. Variavel DATABASE_URL configurada nas Application Settings do App Service
#      (NAO commitar a connection string aqui).
#
# Ajuste os valores em "variables" antes de rodar.

trigger:
  branches:
    include:
      - main

variables:
  azureServiceConnection: 'CoreMonitor-ARM'   # nome da service connection criada no Azure DevOps
  appServiceName: 'coremonitor-api'           # nome do seu Azure App Service
  nodeVersion: '18.x'

stages:
  # ----------------------- ESTAGIO DE CI -----------------------
  - stage: CI
    displayName: 'CI - Build e Testes'
    jobs:
      - job: build_test
        displayName: 'Instalar, testar e empacotar'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            displayName: 'Instalar Node.js'
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: npm install
            displayName: 'npm install'

          - script: npm run lint
            displayName: 'Lint'

          - script: npm test
            displayName: 'Rodar testes (Jest)'

          - task: ArchiveFiles@2
            displayName: 'Empacotar aplicacao'
            inputs:
              rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publicar artefato (drop)'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'drop'

  # ----------------------- ESTAGIO DE CD -----------------------
  - stage: CD
    displayName: 'CD - Deploy no Azure'
    dependsOn: CI
    condition: succeeded()
    jobs:
      - deployment: deploy
        displayName: 'Deploy no Azure App Service'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'producao'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop

                - task: AzureWebApp@1
                  displayName: 'Publicar no App Service'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    appType: 'webAppLinux'
                    appName: '$(appServiceName)'
                    package: '$(Pipeline.Workspace)/drop/app.zip'
                    runtimeStack: 'NODE|18-lts'
                    startUpCommand: 'npm start'
